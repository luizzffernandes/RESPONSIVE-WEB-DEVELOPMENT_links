<title>Navegação</title>

<style>
body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial;
}

/* classe */
.menu ul{
    list-style: none;
    display: flex;
    gap: 8px;
    padding: 0;
}

/* combinador */
.menu li a{
    display: block;
    padding: 10px 14px;

    color: white;
}
</style>
